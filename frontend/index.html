<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRA Genius Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🧠 GRA Genius Agent</h1>
            <p>Balancing stability &amp; entropy for creative intelligence</p>
        </header>
        <div id="chat-container">
            <div id="chat-history">
                <!-- Messages will be rendered here -->
            </div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Type your message..." />
                <button id="send-btn">Send</button>
            </div>
            <div id="metrics" style="display:none;">
                <span>S: <span id="s-value">-</span></span>
                <span>E: <span id="e-value">-</span></span>
                <span>I: <span id="i-value">-</span></span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
